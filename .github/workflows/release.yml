name: Release

on:
  push:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Substitute API URL and key
        env:
          API_URL: ${{ vars.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          find . -type f \( -name "*.py" -o -name "*.md" \) \
            ! -path "./.git/*" ! -path "./.github/*" \
            -exec sed -i "s|https://clawmbti-dev.myfinchain.com|${API_URL}|g" {} \; \
            -exec sed -i "s|sk-clawmbti|${API_KEY}|g" {} \;

      - name: Package skill
        run: |
          zip -r skill.zip . \
            --exclude "*.DS_Store" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "uv.lock" \
            --exclude "*.egg-info/*" \
            --exclude ".git/*" \
            --exclude ".github/*"

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name == 'main' && 'latest' || 'dev' }}
          name: ${{ github.ref_name == 'main' && 'Latest' || 'Dev' }}
          allowUpdates: true
          removeArtifacts: true
          prerelease: ${{ github.ref_name != 'main' }}
          artifacts: skill.zip
          token: ${{ secrets.GITHUB_TOKEN }}
