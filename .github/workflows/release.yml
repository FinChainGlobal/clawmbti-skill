name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Substitute prod URLs
        env:
          PROD_URL: ${{ vars.PROD_URL }}
          PROD_API_KEY: ${{ secrets.PROD_API_KEY }}
        run: |
          find . -type f \( -name "*.py" -o -name "*.md" \) \
            ! -path "./.git/*" ! -path "./.github/*" \
            -exec sed -i "s|https://clawmbti-dev.myfinchain.com|${PROD_URL}|g" {} \; \
            -exec sed -i "s|sk-clawmbti|${PROD_API_KEY}|g" {} \;

      - name: Package skill
        run: |
          zip -r skill.zip . \
            --exclude "*.DS_Store" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "uv.lock" \
            --exclude "*.egg-info/*" \
            --exclude ".git/*" \
            --exclude ".github/*"

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest
          allowUpdates: true
          removeArtifacts: true
          artifacts: skill.zip
          body: |
            Install via Claude Code:
            ```
            curl -L https://github.com/FinChainGlobal/clawmbti-skill/releases/download/latest/skill.zip -o skill.zip
            ```
          token: ${{ secrets.GITHUB_TOKEN }}
